<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VCAL | Guest Calendar</title>
    <!-- Favicon: High-Contrast Calendar Logo -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAzMiAzMiI+PHJlY3QgeD0iMiIgeT0iNCIgd2lkdGg9IjI4IiBoZWlnaHQ9IjI0IiByeD0iNCIgZmlsbD0iI2ZmZmZmZiIgc3Ryb2tlPSIjZWY0NDQ0IiBzdHJva2Utd2lkdGg9IjIiLz48cGF0aCBkPSJNMiA4aDI4VjRhNCA0IDAgMCAwLTQtNEg2YTQgNCAwIDAgMC00IDR6IiBmaWxsPSIjZWY0NDQ0Ii8+PHJlY3QgeD0iOCIgeT0iMiIgd2lkdGg9IjQiIGhlaWdodD0iNCIgcng9IjEiIGZpbGw9IiMzMzQxNTUiLz48cmVjdCB4PSIyMCIgeT0iMiIgd2lkdGg9IjQiIGhlaWdodD0iNCIgcng9IjEiIGZpbGw9IiMzMzQxNTUiLz48dGV4dCB4PSI1MCUiIHk9IjIyIiBmb250LWZhbWlseT0iQXJpYWwsIHNhbnMtc2VyaWYiIGZvbnQtd2VpZ2h0PSI5MDAiIGZvbnQtc2l6ZT0iMTgiIGZpbGw9IiMxZDQwN2UiIHRleHQtYW5jaG9yPSJtaWRkbGUiIGRvbWluYW50LWJhc2VsaW5lPSJtaWRkbGUiPlY8L3RleHQ+PC9zdmc+">

    <!-- Pre-load Libraries -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        html, body, #root { height: 100%; margin: 0; padding: 0; background-color: #f1f5f9; font-family: sans-serif; }
        
        /* Initial Boot Loader */
        #boot-loader {
            position: fixed; inset: 0; display: flex; flex-direction: column;
            align-items: center; justify-content: center; background: white; z-index: 9999;
        }
        .spinner {
            width: 40px; height: 40px; border: 4px solid #f3f3f3;
            border-top: 4px solid #1e293b; border-radius: 50%; animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .bar-text { text-shadow: 1px 1px 0px rgba(0,0,0,0.2); }
        .grid-line { border-right: 1px solid #e2e8f0; }
        .row-line { border-bottom: 1px solid #cbd5e1; }
        .highlight-col { background-color: rgba(59, 130, 246, 0.08); }
    </style>
</head>
<body>
    <div id="boot-loader">
        <div class="spinner"></div>
        <div style="margin-top: 15px; font-weight: 900; letter-spacing: -0.05em; color: #1e293b; text-transform: uppercase;">Syncing VCAL...</div>
    </div>

    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, onSnapshot, setDoc, deleteDoc, addDoc, query, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        
        window.FB = { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, getFirestore, collection, doc, onSnapshot, setDoc, deleteDoc, addDoc, query, getDocs };
        window.dispatchEvent(new Event('firebase-initialized'));
    </script>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef } = React;

        // Helpers
        function formatDateLocal(date) {
            const d = new Date(date);
            const year = d.getFullYear();
            const month = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        function getDDMMM(dateStr) {
            if (!dateStr) return '';
            const parts = dateStr.split('-');
            const d = new Date(parts[0], parts[1] - 1, parts[2]);
            const months = ['JAN', 'FEB', 'MAR', 'APR', 'MAY', 'JUN', 'JUL', 'AUG', 'SEP', 'OCT', 'NOV', 'DEC'];
            return `${d.getDate()}${months[d.getMonth()]}`;
        }

        const Icon = ({ name, size = 16, className = "" }) => {
            const ref = useRef(null);
            useEffect(() => {
                if (ref.current && window.lucide && name) {
                    ref.current.innerHTML = `<i data-lucide="${name}"></i>`;
                    window.lucide.createIcons({
                        icons: { [name]: window.lucide.icons[name] },
                        attrs: { width: size, height: size, 'stroke-width': 3, class: className },
                        nameAttr: 'data-lucide'
                    });
                }
            }, [name, size, className]);
            return <span ref={ref} className="inline-flex items-center justify-center shrink-0" />;
        };

        const firebaseConfig = {
            apiKey: "AIzaSyDN_AIEAJB5G1bcR5kXSMmjlWd9aXLLYak",
            authDomain: "wetvcal.firebaseapp.com",
            projectId: "wetvcal",
            storageBucket: "wetvcal.firebasestorage.app",
            messagingSenderId: "380675879193",
            appId: "1:380675879193:web:8f3cc25411137208441588"
        };

        const APP_ID = 'wetvcal-prod-v1';

        const STATUS_CONFIG = {
            future: { color: 'bg-blue-500', icon: 'Calendar', label: 'FUTURE' },
            checkedIn: { color: 'bg-green-500', icon: 'UserCheck', label: 'IN' },
            checkedOut: { color: 'bg-gray-400', icon: 'LogOut', label: 'OUT' },
            noShow: { color: 'bg-orange-500', icon: 'UserX', label: 'NO-SHOW' },
            problem: { color: 'bg-red-500', icon: 'AlertOctagon', label: 'PROBLEM' },
        };

        const GUEST_TYPES = {
            standard: { icon: 'User', label: 'Standard' },
            art: { icon: 'Palette', label: 'Art' },
            social: { icon: 'Share2', label: 'Social' },
            bar: { icon: 'GlassWater', label: 'Bar' },
            other: { icon: 'HelpCircle', label: 'Other' },
        };

        const COUNTRIES = ["Thailand", "UK", "USA", "Germany", "France", "Israel", "Russia", "Japan", "Australia", "Canada", "Spain", "Italy", "Netherlands", "Sweden", "Switzerland", "China", "South Korea", "Brazil", "Mexico", "Other"].sort();

        function App() {
            const [user, setUser] = useState(null);
            const [rooms, setRooms] = useState([]);
            const [bookings, setBookings] = useState([]);
            const [viewStartDate, setViewStartDate] = useState(new Date(2026, 2, 1));
            const [daysToShow, setDaysToShow] = useState(60);
            const [loading, setLoading] = useState(true);
            const [hoveredCol, setHoveredCol] = useState(null);
            
            const [selectedBooking, setSelectedBooking] = useState(null);
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [isRoomManagerOpen, setIsRoomManagerOpen] = useState(false);
            const [bookingDeleteId, setBookingDeleteId] = useState(null);
            const [roomDeleteId, setRoomDeleteId] = useState(null);
            const [modalPos, setModalPos] = useState({ x: 100, y: 100 });

            // Initialize DB and Auth
            useEffect(() => {
                const init = async () => {
                    const fb = window.FB;
                    if (!fb) return;
                    const app = fb.initializeApp(firebaseConfig);
                    const db = fb.getFirestore(app);
                    const auth = fb.getAuth(app);

                    fb.onAuthStateChanged(auth, async (u) => {
                        if (!u) {
                            try { await fb.signInAnonymously(auth); } catch(e) { console.error(e); }
                        } else {
                            setUser(u);
                            const bPath = fb.collection(db, 'artifacts', APP_ID, 'public', 'data', 'bookings');
                            fb.onSnapshot(bPath, (s) => {
                                setBookings(s.docs.map(d => ({ id: d.id, ...d.data() })));
                                setLoading(false);
                                document.getElementById('boot-loader')?.remove();
                            });

                            const rPath = fb.collection(db, 'artifacts', APP_ID, 'public', 'data', 'rooms');
                            fb.onSnapshot(rPath, (s) => {
                                const data = s.docs.map(d => ({ id: d.id, ...d.data() }));
                                if (data.length === 0) {
                                    fb.addDoc(rPath, { name: '210', beds: 8, collapsed: false, order: 1 });
                                    fb.addDoc(rPath, { name: '211', beds: 16, collapsed: false, order: 2 });
                                } else {
                                    setRooms(data.sort((a,b) => (a.order || 0) - (b.order || 0)));
                                }
                            });
                        }
                    });
                };
                if (window.FB) init();
                else window.addEventListener('firebase-initialized', init);
            }, []);

            useEffect(() => {
                const update = () => setDaysToShow(Math.floor((window.innerWidth - 100) / 20));
                update();
                window.addEventListener('resize', update);
                return () => window.removeEventListener('resize', update);
            }, []);

            const days = useMemo(() => {
                const arr = [];
                const start = new Date(viewStartDate);
                start.setHours(0,0,0,0);
                for (let i = 0; i < daysToShow; i++) {
                    const d = new Date(start);
                    d.setDate(start.getDate() + i);
                    arr.push(d);
                }
                return arr;
            }, [viewStartDate, daysToShow]);

            const flatBeds = useMemo(() => {
                const res = [];
                rooms.forEach(r => {
                    res.push({ type: 'header', roomId: r.id, name: r.name, collapsed: r.collapsed });
                    if (!r.collapsed) {
                        for (let i = 1; i <= (r.beds || 0); i++) res.push({ type: 'bed', roomId: r.id, name: r.name, bed: i });
                    }
                });
                return res;
            }, [rooms]);

            const allBedOptions = useMemo(() => {
                const opts = [];
                rooms.forEach(r => {
                    for (let i = 1; i <= (r.beds || 0); i++) opts.push({ label: `${r.name}-${i}`, val: `${r.id}|${i}` });
                });
                return opts;
            }, [rooms]);

            const handleAdd = (roomId, bed, date) => {
                if (!user) return;
                const checkIn = formatDateLocal(date);
                const outDate = new Date(date); outDate.setDate(outDate.getDate() + 7);
                const checkOut = formatDateLocal(outDate);
                setSelectedBooking({ id: 'new-' + Date.now(), firstName: '', lastName: '', country: 'Thailand', volunteerType: 'standard', roomId, bed, checkIn, checkOut, status: 'future', deposits: { agoda: { val: 0, ref: false }, booking: { val: 0, ref: false }, hostelworld: { val: 0, ref: false }, cash: { val: 0, ref: false } } });
                setBookingDeleteId(null);
                setModalPos({ x: window.innerWidth / 2 - 230, y: 100 });
                setIsModalOpen(true);
            };

            const handleSave = async (data) => {
                if (!user || !window.FB) return;
                const fb = window.FB;
                const db = fb.getFirestore();
                setIsModalOpen(false);
                try {
                    let bId = data.id;
                    if (bId.startsWith('new-')) {
                        bId = fb.doc(fb.collection(db, 'any')).id;
                    }
                    const docRef = fb.doc(db, 'artifacts', APP_ID, 'public', 'data', 'bookings', bId);
                    const { id, ...payload } = data;
                    await fb.setDoc(docRef, payload);
                } catch (e) { alert("Save Error"); }
            };

            const handleDelete = async (id) => {
                if (!user || !id || id.startsWith('new-')) { setIsModalOpen(false); return; }
                setIsModalOpen(false);
                const fb = window.FB;
                const db = fb.getFirestore();
                await fb.deleteDoc(fb.doc(db, 'artifacts', APP_ID, 'public', 'data', 'bookings', id));
            };

            const updateRoom = (id, upd) => {
                if (!user) return;
                window.FB.setDoc(window.FB.doc(window.FB.getFirestore(), 'artifacts', APP_ID, 'public', 'data', 'rooms', id), upd, { merge: true });
            };

            const depositTotals = useMemo(() => {
                if (!selectedBooking) return { paid: 0, ref: 0, bal: 0 };
                const deps = selectedBooking.deposits || {};
                const paid = Object.values(deps).reduce((sum, d) => sum + (Number(d.val) || 0), 0);
                const ref = Object.values(deps).reduce((sum, d) => sum + (d.ref ? Number(d.val) || 0 : 0), 0);
                return { paid, ref, bal: paid - ref };
            }, [selectedBooking]);

            if (loading && !user) return null;

            return (
                <div className="flex flex-col h-screen overflow-hidden select-none">
                    <header className="flex items-center justify-between px-4 py-2 bg-white border-b-2 border-slate-300 shadow-sm z-40 shrink-0">
                        <div className="flex items-center gap-4">
                            <h1 className="text-xl font-black text-slate-800 tracking-tighter uppercase">VCAL</h1>
                            <div className="flex items-center bg-gray-100 rounded border-2 border-slate-300 p-1">
                                <button onClick={() => setViewStartDate(d => { const n = new Date(d); n.setDate(n.getDate() - 7); return n; })} className="p-1 hover:bg-white"><Icon name="ChevronLeft" size={20}/></button>
                                <span className="px-4 font-black text-xs uppercase text-slate-700 w-32 text-center">{viewStartDate.toLocaleDateString('en-US', { month: 'short', year: 'numeric' })}</span>
                                <button onClick={() => setViewStartDate(d => { const n = new Date(d); n.setDate(n.getDate() + 7); return n; })} className="p-1 hover:bg-white"><Icon name="ChevronRight" size={20}/></button>
                            </div>
                        </div>
                        <div className="flex gap-2">
                            <button onClick={() => { setIsRoomManagerOpen(true); setRoomDeleteId(null); }} className="px-4 py-2 bg-slate-800 text-white rounded font-black text-xs uppercase shadow hover:scale-105 active:scale-95 transition-all">Rooms</button>
                            <button onClick={() => setViewStartDate(new Date(new Date().setHours(0,0,0,0)))} className="px-4 py-2 bg-white border-2 border-slate-800 rounded font-black text-xs uppercase">Today</button>
                        </div>
                    </header>

                    <main className="flex-1 overflow-auto relative bg-white" onMouseLeave={() => setHoveredCol(null)}>
                        <div className="inline-block min-w-fit pr-[2px]">
                            <div className="sticky top-0 z-20 flex bg-white border-b-2 border-slate-400 shadow-sm h-10">
                                <div className="sticky left-0 z-30 bg-slate-50 border-r-2 border-slate-400 w-[100px] flex items-center justify-center text-[11px] font-black uppercase text-slate-500">BED</div>
                                {days.map((d, i) => (
                                    <div key={i} onMouseEnter={() => setHoveredCol(i)} className={`flex flex-col items-center justify-center border-r border-slate-200 w-[20px] text-[10px] font-bold ${hoveredCol === i ? 'bg-blue-100/50' : ''} ${d.getDate() === 1 ? 'border-l-4 border-l-blue-600 bg-blue-50' : ''}`}>
                                        <span>{d.getDate()}</span>
                                    </div>
                                ))}
                            </div>

                            {flatBeds.map((row) => {
                                if (row.type === 'header') return <div key={row.roomId} className="flex bg-slate-700 text-white font-black text-[12px] uppercase h-7 items-center cursor-pointer" onClick={() => updateRoom(row.roomId, { collapsed: !row.collapsed })}><div className="sticky left-0 z-10 bg-inherit border-r-2 border-slate-500 px-2 flex items-center gap-2 w-[100px]"><Icon name="ChevronDown" className={row.collapsed ? '-rotate-90' : ''} size={14} /> {row.name}</div></div>;
                                
                                return (
                                    <div key={`${row.roomId}-${row.bed}`} className="flex row-line h-[33px] group relative">
                                        <div className="sticky left-0 z-10 bg-slate-50 border-r-2 border-slate-400 w-[100px] flex items-center px-2 text-[12px] font-black text-slate-600 group-hover:bg-blue-50">{row.name}-{row.bed}</div>
                                        {days.map((d, di) => <div key={di} onMouseEnter={() => setHoveredCol(di)} onClick={() => handleAdd(row.roomId, row.bed, d)} className={`grid-line w-[20px] cursor-crosshair h-full ${hoveredCol === di ? 'bg-blue-50/50' : ''}`} />)}
                                        
                                        {bookings.filter(b => b.roomId === row.roomId && b.bed === row.bed).map(b => {
                                            const start = b.checkIn; const end = b.checkOut;
                                            const vStart = formatDateLocal(days[0]); const vEnd = formatDateLocal(days[days.length-1]);
                                            if (end <= vStart || start > vEnd) return null;
                                            const dStart = start < vStart ? vStart : start; const dEnd = end > vEnd ? vEnd : end;
                                            const getDiff = (s, e) => (new Date(e) - new Date(s)) / 86400000;
                                            const left = getDiff(vStart, dStart) * 20; const width = getDiff(dStart, dEnd) * 20;
                                            const S = STATUS_CONFIG[b.status] || STATUS_CONFIG.future;
                                            const T = GUEST_TYPES[b.volunteerType || 'standard'] || GUEST_TYPES.standard;
                                            const paid = Object.values(b.deposits || {}).reduce((s,d) => s + (Number(d.val)||0), 0);
                                            const bal = Object.values(b.deposits || {}).reduce((s,d) => s + (Number(d.val)||0) - (d.ref?Number(d.val)||0 : 0), 0);
                                            return (
                                                <div key={b.id} onClick={(e) => { e.stopPropagation(); setSelectedBooking(b); setBookingDeleteId(null); setModalPos({ x: e.clientX > 450 ? e.clientX - 450 : 20, y: 100 }); setIsModalOpen(true); }}
                                                    className={`absolute h-[31px] mt-[1px] border border-black/10 flex items-center px-1 text-white shadow-sm cursor-pointer z-10 hover:brightness-110 ${S.color} ${start >= vStart ? 'rounded-l' : ''} ${end <= vEnd ? 'rounded-r' : ''}`}
                                                    style={{ left: 100 + left, width: Math.max(width, 4) }}>
                                                    <div className="flex items-center gap-1.5 w-full overflow-hidden leading-none bar-text">
                                                        <Icon name={T.icon} size={16} />
                                                        <span className="font-black text-[18px] uppercase tracking-tighter truncate">{b.firstName}</span>
                                                        <span className="font-black text-[18px] opacity-70 truncate">{getDDMMM(start)}-{getDDMMM(end)}</span>
                                                        <Icon name={S.icon} size={16} className="ml-auto opacity-90" />
                                                        {paid > 0 && <div className={`shrink-0 w-4 h-4 rounded-full flex items-center justify-center border border-black/10 ${bal === 0 ? 'bg-green-600' : 'bg-yellow-400'}`}>{bal === 0 ? <Icon name="Check" size={12} /> : <span className="text-[10px] font-black text-black">฿</span>}</div>}
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                );
                            })}
                        </div>
                    </main>

                    {isModalOpen && selectedBooking && (
                        <div className="fixed z-50 bg-white border-2 border-slate-800 shadow-2xl rounded-lg w-[460px] overflow-hidden" style={{ left: modalPos.x, top: modalPos.y }}>
                            <div className={`${STATUS_CONFIG[selectedBooking.status]?.color || 'bg-slate-500'} p-3 text-white flex justify-between items-center cursor-move`}>
                                <div className="flex items-center gap-2 flex-1 mr-2">
                                    <span className="bg-black/30 px-2 py-0.5 rounded text-[10px] font-black uppercase">{rooms.find(r => r.id === selectedBooking.roomId)?.name}-{selectedBooking.bed}</span>
                                    <input className="bg-transparent border-none outline-none font-black text-xl uppercase w-1/2 placeholder:text-white/50" value={selectedBooking.firstName} placeholder="FIRST" onChange={e => setSelectedBooking({...selectedBooking, firstName: e.target.value})} />
                                    <input className="bg-transparent border-none outline-none font-black text-xl uppercase w-1/2 placeholder:text-white/50" value={selectedBooking.lastName} placeholder="LAST" onChange={e => setSelectedBooking({...selectedBooking, lastName: e.target.value})} />
                                </div>
                                <button onClick={() => setIsModalOpen(false)}><Icon name="X" size={24}/></button>
                            </div>
                            <div className="p-4 space-y-4">
                                <div className="grid grid-cols-2 gap-4">
                                    <div><label className="text-[10px] font-black text-slate-400 uppercase block mb-1">Country</label><select className="w-full border-b-2 border-slate-200 font-bold text-sm py-1 outline-none focus:border-slate-800" value={selectedBooking.country} onChange={e => setSelectedBooking({...selectedBooking, country: e.target.value})}>{COUNTRIES.map(c => <option key={c} value={c}>{c}</option>)}</select></div>
                                    <div><label className="text-[10px] font-black text-slate-400 uppercase block mb-1">Guest Type</label><select className="w-full border-b-2 border-slate-200 font-bold text-sm py-1 outline-none uppercase" value={selectedBooking.volunteerType} onChange={e => setSelectedBooking({...selectedBooking, volunteerType: e.target.value})}>{Object.entries(GUEST_TYPES).map(([k,v]) => <option key={k} value={k}>{v.label}</option>)}</select></div>
                                </div>
                                <div className="grid grid-cols-2 gap-4">
                                    <div><label className="text-[10px] font-black text-slate-400 uppercase block mb-1">Check-In</label><input type="date" className="w-full border-2 border-slate-100 p-2 font-bold text-sm" value={selectedBooking.checkIn} onChange={e => setSelectedBooking({...selectedBooking, checkIn: e.target.value})} /></div>
                                    <div><label className="text-[10px] font-black text-slate-400 uppercase block mb-1">Check-Out</label><input type="date" className="w-full border-2 border-slate-100 p-2 font-bold text-sm" value={selectedBooking.checkOut} onChange={e => setSelectedBooking({...selectedBooking, checkOut: e.target.value})} /></div>
                                </div>
                                <div className="grid grid-cols-2 gap-4 items-end">
                                    <div><label className="text-[10px] font-black text-gray-400 uppercase block mb-1">Move Bed</label><select className="w-full border-b-2 border-slate-300 font-bold text-sm py-1 bg-transparent focus:border-slate-800 outline-none" value={`${selectedBooking.roomId}|${selectedBooking.bed}`} onChange={e => { const [rId, bNum] = e.target.value.split('|'); setSelectedBooking({...selectedBooking, roomId: rId, bed: parseInt(bNum)}); }}>{allBedOptions.map(opt => <option key={opt.val} value={opt.val}>{opt.label}</option>)}</select></div>
                                    <div className="flex-1"><label className="text-[10px] font-black text-gray-400 uppercase mb-1 block text-center">Status Action</label><div className="grid grid-cols-5 gap-1">{Object.entries(STATUS_CONFIG).map(([key, cfg]) => <button key={key} type="button" onClick={() => setSelectedBooking({...selectedBooking, status: key})} className={`flex flex-col items-center justify-center p-1 rounded border-2 transition-all ${selectedBooking.status === key ? `${cfg.color} text-white border-transparent shadow-lg scale-110 z-10` : 'bg-gray-100 text-gray-400 border-gray-200 hover:bg-gray-200'}`}><Icon name={cfg.icon} size={16} /><span className="text-[7px] font-black mt-1 uppercase text-center leading-tight">{cfg.label}</span></button>)}</div></div>
                                </div>
                                <div className="bg-slate-50 border-2 border-slate-200 rounded p-3 space-y-2">
                                    <label className="text-[11px] font-black text-slate-800 uppercase flex items-center gap-1"><Icon name="Coins" size={14}/> Deposits (฿)</label>
                                    {['agoda', 'booking', 'hostelworld', 'cash'].map(k => (
                                        <div key={k} className="flex items-center gap-4">
                                            <span className="w-16 text-[10px] font-black text-slate-400 uppercase">{k}</span>
                                            <input type="number" className="flex-1 bg-transparent border-b border-slate-300 font-bold text-sm outline-none" value={selectedBooking.deposits[k]?.val || ''} onChange={e => setSelectedBooking({...selectedBooking, deposits: {...selectedBooking.deposits, [k]: {...selectedBooking.deposits[k], val: e.target.value}}})} />
                                            <button type="button" onClick={() => setSelectedBooking({...selectedBooking, deposits: {...selectedBooking.deposits, [k]: {...selectedBooking.deposits[k], ref: !selectedBooking.deposits[k]?.ref}}})} className={`px-2 py-1 rounded text-[9px] font-black uppercase ${selectedBooking.deposits[k]?.ref ? 'bg-green-600 text-white' : 'bg-slate-200 text-slate-500'}`}>{selectedBooking.deposits[k]?.ref ? 'Refunded' : 'Refund?'}</button>
                                        </div>
                                    ))}
                                </div>
                                <div className="flex justify-between pt-4 border-t-2 border-slate-100">
                                    {bookingDeleteId === selectedBooking.id ? (
                                        <button onClick={() => handleDelete(selectedBooking.id)} className="bg-red-600 text-white px-4 py-2 rounded text-[10px] font-black uppercase animate-pulse">Confirm Delete?</button>
                                    ) : (
                                        <button onClick={() => setBookingDeleteId(selectedBooking.id)} className="text-red-500 text-[10px] font-black uppercase hover:underline">Delete Stay</button>
                                    )}
                                    <div className="flex gap-2">
                                        <button onClick={() => setIsModalOpen(false)} className="px-4 py-2 bg-slate-100 rounded text-xs font-black uppercase">Cancel</button>
                                        <button onClick={() => handleSave(selectedBooking)} className="px-8 py-2 bg-slate-800 text-white rounded text-xs font-black uppercase shadow-lg">Save Changes</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {isRoomManagerOpen && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/60">
                            <div className="bg-white rounded-xl shadow-2xl w-full max-w-sm overflow-hidden border-2 border-slate-800">
                                <div className="bg-slate-800 text-white p-4 flex justify-between items-center text-xs font-black uppercase tracking-widest"><span>Rooms Manager</span><button onClick={() => setIsRoomManagerOpen(false)}><Icon name="X" size={20}/></button></div>
                                <div className="p-4 space-y-3 max-h-[70vh] overflow-auto">
                                    {rooms.map(r => (
                                        <div key={r.id} className="flex items-center gap-3 p-3 bg-slate-50 rounded border-2 border-slate-200 shadow-sm">
                                            <div className="flex-1"><label className="text-[9px] font-black text-gray-400 block mb-0.5 uppercase">Name</label><input className="w-full bg-transparent font-black uppercase text-sm border-b border-slate-300" value={r.name} onChange={e => updateRoom(r.id, { name: e.target.value })} /></div>
                                            <div className="w-12"><label className="text-[9px] font-black text-gray-400 block mb-0.5 uppercase">Beds</label><input type="number" className="w-full bg-transparent font-black text-sm border-b border-slate-300" value={r.beds} onChange={e => updateRoom(r.id, { beds: parseInt(e.target.value) || 1 })} /></div>
                                            <div className="flex flex-col gap-1 shrink-0">{roomDeleteId === r.id ? <button onClick={async () => { await window.FB.deleteDoc(window.FB.doc(window.FB.getFirestore(), 'artifacts', APP_ID, 'public', 'data', 'rooms', r.id)); setRoomDeleteId(null); }} className="bg-red-600 text-white px-2 py-1 rounded text-[8px] font-black uppercase animate-pulse border border-red-800">KILL IT</button> : <button onClick={() => setRoomDeleteId(r.id)} className="text-red-400 p-2 hover:text-red-600 mt-2"><Icon name="Trash2" size={18}/></button>}</div>
                                        </div>
                                    ))}
                                    <button onClick={async () => { await window.FB.addDoc(window.FB.collection(window.FB.getFirestore(), 'artifacts', APP_ID, 'public', 'data', 'rooms'), { name: 'NEW', beds: 4, collapsed: false, order: rooms.length + 1 }); }} className="w-full py-4 border-4 border-dashed rounded-lg font-black text-xs text-slate-400 uppercase hover:border-blue-500 transition-all">+ Add New Room</button>
                                </div>
                            </div>
                        </div>
                    )}

                    <footer className="bg-white border-t-2 border-slate-300 px-4 py-2 flex justify-between items-center text-[10px] text-slate-500 font-black uppercase shrink-0 overflow-x-auto no-scrollbar">
                        <div className="flex gap-4 items-center whitespace-nowrap">
                            {Object.entries(STATUS_CONFIG).map(([k,v]) => <div key={k} className="flex items-center gap-1"><div className={`w-3 h-3 rounded ${v.color}`}></div> {v.label}</div>)}
                            <div className="h-4 w-px bg-slate-300 mx-2"></div>
                            {Object.entries(GUEST_TYPES).map(([k,v]) => <div key={k} className="flex items-center gap-1"><Icon name={v.icon} size={12} /> {v.label}</div>)}
                        </div>
                        <div className="flex items-center gap-4 ml-8 whitespace-nowrap">
                            <div className="flex items-center gap-1"><div className="w-4 h-4 rounded-full bg-yellow-400 flex items-center justify-center text-[8px] text-black">฿</div> Bal Due</div>
                            <div className="flex items-center gap-1"><div className="w-4 h-4 rounded-full bg-green-600 flex items-center justify-center shadow-sm"><Icon name="Check" size={10} className="text-white" /></div> Paid</div>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

    <script src="https://loren-6q.github.io/WETNav/nav.js"></script>
</body>
</html>
